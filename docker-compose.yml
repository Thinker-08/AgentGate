services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentgate
      POSTGRES_PASSWORD: agentgate
      POSTGRES_DB: agentgate
    volumes:
      - ./migrations/0001_init.up.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./deploy/docker/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentgate"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  agentgate:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    environment:
      AGENTGATE_HTTP_ADDR: ":8080"
      AGENTGATE_ADMIN_ADDR: ":9090"
      AGENTGATE_POSTGRES_DSN: "postgres://agentgate:agentgate@postgres:5432/agentgate?sslmode=disable"
      AGENTGATE_REDIS_ADDR: "redis:6379"
      AGENTGATE_VERIFIER: "${AGENTGATE_VERIFIER:-mock}"
      AGENTGATE_FACILITATOR_URL: "${AGENTGATE_FACILITATOR_URL:-https://x402.org/facilitator}"
      AGENTGATE_NETWORK: "base-sepolia"
      AGENTGATE_ASSET: "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
      AGENTGATE_ASSET_NAME: "USDC"
      AGENTGATE_ASSET_VERSION: "2"
      AGENTGATE_PAY_TO: "0x209693Bc6afc0C5328bA36FaF03C514EF312287C"
      AGENTGATE_TOKEN_TTL: "120s"
      AGENTGATE_EDGE_SECRET: "agentgate-edge-demo-secret"
      AGENTGATE_PAID_REDIRECT_PREFIX: "/_agentgate_origin"
      AGENTGATE_ENV: "dev"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/healthz || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20

  demo-upstream:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/docker/upstream.conf:/etc/nginx/conf.d/default.conf:ro

  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx/compose-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      agentgate:
        condition: service_healthy
      demo-upstream:
        condition: service_started
    ports:
      - "8088:80"

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      agentgate:
        condition: service_healthy
    ports:
      - "9091:9090"

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"

volumes:
  prometheus-data:
  grafana-data:
