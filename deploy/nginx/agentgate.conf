# =============================================================================
# AgentGate — nginx forward-auth integration (drop-in for an EXISTING nginx)
# =============================================================================
# This config makes your existing nginx call AgentGate as a forward-auth sidecar
# via auth_request, and delivers a real HTTP 402 x402 challenge to agents.
#
# It implements the corrected decisions from docs/09-design-review-and-decisions.md:
#   B1  402 via error_page 401 = /_agentgate_challenge (auth_request discards bodies)
#   B6  log_format that NEVER logs Authorization / X-PAYMENT  (A9)
#   B7  cache auth decisions ONLY for the token fast-path, never class-conditional
#   B8  strip client-supplied trust headers; trust real IP only from your edge
#   B9  PUBLIC paths fail-open in STATIC nginx config — no AgentGate call needed,
#       so a Redis/AgentGate outage cannot 503 your free content
#   B10 shadow/monitor-only mode (mirror) + path-scoped rollout + kill-switch note
#   B11 OPTIONS/CORS preflight short-circuited before auth_request
#   B12 AgentGate timeout < nginx auth_request timeout; validate with `nginx -t`
#   B13 payment = transparent retry: a request carrying X-PAYMENT is rewritten to
#       /_agentgate_settle (never auth); on success /verify returns X-Accel-Redirect
#       so nginx serves the ORIGIN resource + the reusable JWT in X-AgentGate-Token,
#       on failure 402/409/403 verbatim. No /agentgate/* path is exposed to clients.
#
# Tested shape: stock nginx >= 1.7.3 (auth_request + proxy_cache + X-Accel-Redirect).
# For full response control, see the OpenResty variant at the bottom.
# -----------------------------------------------------------------------------
# HOW TO ADOPT (staged, reversible):
#   1) Merge the http{}-level blocks (map, log_format, upstreams, cache, real_ip).
#   2) Start in SHADOW mode (server block #2) — observe decisions for days.
#   3) Switch ONE priced location to the enforcing block (#1). Never site-wide first.
#   4) Rollback = remove `auth_request` from that location + `nginx -s reload`.
#   Runtime kill-switch (no reload): set AgentGate's AGENTGATE_ENFORCE=false so
#   /authz always returns 204 (ALLOW). Use during incidents.
# =============================================================================


# ============================ http{} CONTEXT =================================
# Place these inside your existing `http { ... }` block.

# --- Upstreams -------------------------------------------------------------
upstream agentgate   { server 127.0.0.1:8080; keepalive 32; }   # AgentGate sidecar
upstream backend_app { server 127.0.0.1:9000; keepalive 32; }   # your origin

# --- Trust boundary (B8): compute the real client IP ONLY from your edge/LB ---
# Without this, a client can forge X-Forwarded-For to spoof a verified-bot IP or
# evade IP rate limits. Replace with YOUR trusted proxy/LB CIDRs only.
set_real_ip_from 10.0.0.0/8;
# set_real_ip_from <your-LB-cidr>;
real_ip_header   X-Forwarded-For;
real_ip_recursive on;

# --- Secret-free access log (B6 / A9) --------------------------------------
# Never capture Authorization or X-PAYMENT (the signed x402 payload can be used
# to front-run settlement). Use THIS log_format on any server that sees agents.
log_format agentgate_safe
    '$remote_addr - $status "$request" '
    'rt=$request_time uct="$upstream_connect_time" urt="$upstream_response_time" '
    'ua="$http_user_agent" dec="$sent_http_x_agentgate_decision"';

# --- Auth-decision cache (B7) ----------------------------------------------
# ONLY safe for the authenticated token fast-path. We gate caching on the
# presence of a bearer token below; class-conditional/detection paths are NEVER
# cached (one cached 200 would be served to all callers regardless of bot class).
proxy_cache_path /var/cache/nginx/agentgate levels=1:2 keys_zone=agentgate_auth:10m
                 max_size=100m inactive=10m use_temp_path=off;

# Cache key: bearer token + URI. If there is no token, $http_authorization is
# empty -> we DISABLE caching for that request (see $ag_no_cache below) so public
# / class-conditional decisions never share a cache entry.
map $http_authorization $ag_no_cache {
    ""      1;   # no token -> do not cache the auth decision
    default 0;   # token present -> cacheable (token-only fast path)
}

# NOTE (B9 / D3): PUBLIC paths are matched by the regex `location` in the server
# block below (no auth_request), so they stay up even if AgentGate/Redis is down.
# Decided in nginx so we never need to ask AgentGate "is this public?".

# CORS allow-list for browser-context agents (B11). Tighten to your origins.
map $http_origin $ag_cors_origin {
    default "";
    "~^https?://(localhost|.*\.example\.com)(:\d+)?$" $http_origin;
}

# Strip the internal __agt token arg from a paid X-Accel-Redirect while preserving the
# agent's original query string, so the origin serves exactly what was paid for and the
# JWT is never forwarded to the origin (or its logs).
map $args $ag_origin_args {
    "~^__agt=[^&]*&(?<rest>.*)$"  $rest;
    "~^__agt=[^&]*$"             "";
    default                      $args;
}


# ===========================================================================
# SERVER BLOCK #1 — ENFORCING (use on priced locations, after shadow soak)
# ===========================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name api.example.com;
    access_log /var/log/nginx/agentgate.access.log agentgate_safe;

    # B2: bound how much of a denied POST/PUT body buffers before the auth decision.
    client_max_body_size 5m;
    client_body_buffer_size 256k;

    # --- Clear any client-supplied trust/decision headers (B8) -------------
    # Belt-and-suspenders: an attacker must never assert these. We set the real
    # values from nginx's own variables in the /authz location below.
    # (underscores_in_headers off is nginx default; X-AgentGate-* use hyphens.)

    # ---- PUBLIC paths: NO auth_request at all (B9). Always available. ------
    location ~ ^/(public/|health|robots\.txt|favicon\.ico) {
        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # ---- PROTECTED location: forward-auth enforced -----------------------
    location / {
        # B11: answer CORS preflight BEFORE auth_request so agents/browsers can
        # read the 402 challenge. OPTIONS is never gated.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $ag_cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, X-PAYMENT, Content-Type" always;
            add_header Access-Control-Expose-Headers "WWW-Authenticate, X-PAYMENT-RESPONSE" always;
            add_header Access-Control-Max-Age 600 always;
            add_header Content-Length 0;
            return 204;
        }

        # x402 payment submission (transparent retry): an agent that re-issues its
        # ORIGINAL request carrying the signed X-PAYMENT header is routed to the
        # settle path, never to auth. The agent only ever talks to the resource
        # URL it is buying — no AgentGate path is exposed to the client. Safe in
        # stock nginx because /verify returns a short-lived JWT (not the body), so
        # no request-body forwarding is required.
        if ($http_x_payment) {
            rewrite ^ /_agentgate_settle last;
        }

        auth_request /authz;

        # Capture decision metadata IMMEDIATELY after auth_request (these vars
        # are empty if read elsewhere). Only WWW-Authenticate auto-propagates.
        auth_request_set $ag_chalid   $upstream_http_x_agentgate_challenge_id;
        auth_request_set $ag_price    $upstream_http_x_agentgate_price;
        auth_request_set $ag_resource $upstream_http_x_agentgate_resource;

        # Bare '=' keeps the final status from the target location (402 / 403).
        error_page 401 = /_agentgate_challenge;   # REQUIRE-PAYMENT -> real 402
        error_page 403 = @agentgate_deny;        # DENY
        error_page 500 502 503 504 = @agentgate_unavailable;  # AgentGate down -> fail-closed on PAID paths

        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        # Paid content must never be cached by intermediaries (x402 cache confusion)
        proxy_no_cache 1; proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin $ag_cors_origin always;
    }

    # ---- Internal forward-auth subrequest --------------------------------
    location = /authz {
        internal;
        proxy_pass              http://agentgate/authz;
        proxy_method            POST;
        proxy_pass_request_body off;           # B2: decision needs headers only
        proxy_set_header        Content-Length "";
        client_max_body_size    0;

        # Original request context (subrequest line is GET; method MUST be a header — B4)
        proxy_set_header X-Original-URI    $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-Host   $host;
        proxy_set_header X-Real-IP         $remote_addr;        # post-realip true client IP
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent        $http_user_agent;
        proxy_set_header Authorization     $http_authorization; # agent's access token, if any
        proxy_set_header traceparent       $http_traceparent;   # B5: stitch the trace

        # B8: overwrite any client-sent fingerprint/decision headers with our own
        # (empty unless your TLS-terminating layer/patched nginx provides JA4).
        proxy_set_header X-JA4             $http_ssl_ja4;
        proxy_set_header X-AgentGate-Challenge-Id "";

        # B7: cache ONLY the token fast-path; bypass entirely when no token.
        proxy_cache         agentgate_auth;
        proxy_cache_key     "$http_authorization$request_uri";
        proxy_no_cache      $ag_no_cache;
        proxy_cache_bypass  $ag_no_cache;
        proxy_cache_valid   200 204 30s;       # TTL <= JWT/grant lifetime
        proxy_cache_valid   401 403 0;         # NEVER cache challenges/denials
    }

    # ---- Challenge generator: emits the REAL 402 + x402 JSON body --------
    # Normal internal location, not an @named one: nginx forbids a proxy_pass URI part inside
    # an @named location, so error_page 401 targets this path.
    location = /_agentgate_challenge {
        internal;
        proxy_method            GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-AgentGate-Challenge-Id $ag_chalid;
        proxy_set_header X-AgentGate-Price        $ag_price;
        proxy_set_header X-AgentGate-Resource     $ag_resource;
        proxy_set_header X-Original-URI           $request_uri;
        proxy_set_header X-Original-Method        $request_method;
        proxy_set_header X-Original-Host          $host;
        proxy_set_header traceparent              $http_traceparent;
        proxy_pass http://agentgate/challenge;   # returns 402 + headers + JSON, forwarded verbatim
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin $ag_cors_origin always;
        add_header Access-Control-Expose-Headers "WWW-Authenticate, X-PAYMENT-RESPONSE" always;
    }

    location @agentgate_deny {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 403 '{"error":"forbidden","code":"AGENTGATE_DENY"}';
    }

    # AgentGate/Redis down: fail-CLOSED on paid paths (public paths above never reach here)
    location @agentgate_unavailable {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Retry-After   "5"        always;
        return 503 '{"error":"payment_service_unavailable","code":"AGENTGATE_DOWN"}';
    }

    # ---- Payment settlement (internal; never reachable directly by clients) --
    # The protected location rewrites any request carrying X-PAYMENT to here, so
    # the agent pays by re-issuing its ORIGINAL request (the resource URL) with the
    # signed X-PAYMENT header — exactly the stock x402 client behaviour.
    # On SUCCESS, AgentGate (set AGENTGATE_PAID_REDIRECT_PREFIX=/_agentgate_origin)
    # returns `X-Accel-Redirect: /_agentgate_origin<resource>?__agt=<jwt>`, so nginx
    # serves the ORIGIN resource itself (200 + body) and surfaces the reusable JWT in
    # the X-AgentGate-Token response header — the agent gets its data in one shot and
    # never has to learn to "stop sending the header". On FAILURE /verify returns
    # 402/409/403 verbatim (X-Accel-Redirect is emitted only on 200). X-PAYMENT rides
    # a header, so no request body is forwarded. If AGENTGATE_EDGE_SECRET is enabled,
    # add `proxy_set_header X-AgentGate-Edge` here exactly as on /authz.
    location = /_agentgate_settle {
        internal;
        proxy_pass http://agentgate/verify;
        proxy_method            POST;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_http_version 1.1;
        proxy_set_header Host             $host;
        proxy_set_header X-PAYMENT        $http_x_payment;
        proxy_set_header X-Original-URI   $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-Host  $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-AgentGate-Challenge-Id "";
        proxy_set_header traceparent      $http_traceparent;
        add_header Access-Control-Allow-Origin $ag_cors_origin always;
        add_header Access-Control-Expose-Headers "X-PAYMENT-RESPONSE" always;
        add_header Cache-Control "no-store" always;
    }

    # ---- Paid-resource serve target (internal) ----------------------------
    # X-Accel-Redirect from /verify lands here on a successful paid retry. It strips
    # the /_agentgate_origin prefix and the __agt query arg (so the minted JWT is
    # NEVER forwarded to your origin or its access logs), serves the real resource
    # from your origin, and re-emits the JWT as X-AgentGate-Token so the agent can
    # ride the /authz fast path on subsequent requests instead of paying again.
    location /_agentgate_origin/ {
        internal;
        set $agt  $arg___agt;
        set $args $ag_origin_args;
        rewrite ^/_agentgate_origin/(.*)$ /$1 break;
        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header X-AgentGate-Token $agt always;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin $ag_cors_origin always;
        add_header Access-Control-Expose-Headers "X-AgentGate-Token" always;
    }
}


# ===========================================================================
# SERVER BLOCK #2 — SHADOW / MONITOR-ONLY (B10). Deploy this FIRST.
# ===========================================================================
# nginx ALWAYS proxies to the origin; a mirrored copy goes to AgentGate /authz
# so you can observe (in analytics) what it WOULD decide, with zero enforcement
# and zero risk, for as long as you like. Flip to block #1 per-path when ready.
server {
    listen 443 ssl;
    http2 on;
    server_name shadow.example.com;
    access_log /var/log/nginx/agentgate.shadow.log agentgate_safe;

    location / {
        mirror /authz_shadow;          # fire-and-forget copy to AgentGate
        mirror_request_body off;
        proxy_pass http://backend_app; # original request ALWAYS served
        proxy_set_header Host $host;
    }

    location = /authz_shadow {
        internal;
        proxy_pass http://agentgate/authz?shadow=1;
        proxy_method POST;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI    $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-Host   $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header User-Agent        $http_user_agent;
        proxy_set_header Authorization     $http_authorization;
    }
}

# ===========================================================================
# OpenResty variant (recommended where you can run OpenResty): AgentGate's
# /authz returns the FULL 402 (status + x402 headers + JSON body) and Lua relays
# it byte-for-byte, removing every auth_request body-discard workaround. See
# docs/01-architecture.md §4 for the access_by_lua_block implementation.
# ===========================================================================
