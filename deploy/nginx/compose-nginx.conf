# =============================================================================
# AgentGate demo gateway (docker-compose). Stock nginx in front of the sidecar.
# This is the concrete config the demo stack runs; deploy/nginx/agentgate.conf is
# the documented drop-in for an existing nginx. Keep the core mechanism in sync.
#
# Request flow:
#   client ─▶ location /
#     • OPTIONS                         -> 204 CORS preflight (never gated)
#     • carries X-PAYMENT               -> rewrite to /_agentgate_settle (pay)
#     • else                            -> auth_request /authz (allow/pay/deny)
#         204 allow -> proxy to demo_upstream
#         401 pay   -> error_page -> /_agentgate_challenge (real 402 + x402 JSON)
#         403 deny  -> @deny ;  5xx -> @unavailable
#   pay path: /_agentgate_settle -> AgentGate /verify; on success /verify returns
#     X-Accel-Redirect to /_agentgate_origin/<resource> so nginx serves the ORIGIN
#     resource itself (200 + body) and re-emits the JWT as X-AgentGate-Token; on
#     failure /verify returns 402/409/403 verbatim.
# No AgentGate path is ever exposed to the client; :8080 is reachable only here.
# =============================================================================

upstream agentgate     { server agentgate:8080; }
upstream demo_upstream { server demo-upstream:8090; }

log_format safe '$remote_addr $status "$request" rt=$request_time dec=$sent_http_x_agentgate_decision';

# Strip the internal __agt token arg from a paid X-Accel-Redirect while preserving the
# agent's original query string, so the origin serves exactly what was paid for and the
# minted JWT is never forwarded to the origin (or its logs).
map $args $ag_origin_args {
    "~^__agt=[^&]*&(?<rest>.*)$"  $rest;
    "~^__agt=[^&]*$"              "";
    default                       $args;
}

server {
    listen 80;
    server_name _;
    access_log /var/log/nginx/access.log safe;
    client_max_body_size 5m;
    client_body_buffer_size 256k;

    # ---- PUBLIC: no auth_request, always available -------------------------
    location /public/ {
        proxy_pass http://demo_upstream;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store" always;
    }

    # ---- PROTECTED entry point ---------------------------------------------
    location / {
        # CORS preflight before auth, so agents can read the 402 challenge.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, X-PAYMENT, Content-Type" always;
            add_header Access-Control-Expose-Headers "WWW-Authenticate, X-PAYMENT-RESPONSE" always;
            add_header Access-Control-Max-Age 600 always;
            add_header Content-Length 0;
            return 204;
        }
        # A request carrying X-PAYMENT is a payment, not an auth check.
        if ($http_x_payment) {
            rewrite ^ /_agentgate_settle last;
        }
        auth_request /authz;
        auth_request_set $ag_resource $upstream_http_x_agentgate_resource;
        error_page 401 = /_agentgate_challenge;
        error_page 403 = @deny;
        error_page 500 502 503 504 = @unavailable;
        proxy_pass http://demo_upstream;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ---- Internal: forward-auth decision -----------------------------------
    location = /authz {
        internal;
        proxy_pass http://agentgate/authz;
        proxy_method POST;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-AgentGate-Edge "agentgate-edge-demo-secret";
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header X-JA4 "";
    }

    # ---- Internal: x402 challenge builder (real 402 + JSON) ----------------
    location = /_agentgate_challenge {
        internal;
        proxy_pass http://agentgate/challenge;
        proxy_method GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-AgentGate-Resource $ag_resource;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-AgentGate-Edge "agentgate-edge-demo-secret";
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "WWW-Authenticate, X-PAYMENT-RESPONSE" always;
    }

    # ---- Internal: payment settlement --------------------------------------
    # On success /verify returns X-Accel-Redirect=/_agentgate_origin<resource>?__agt=<jwt>
    # (served below); on failure it returns 402/409/403 verbatim. X-PAYMENT is a
    # header, so no request body is forwarded.
    location = /_agentgate_settle {
        internal;
        proxy_pass http://agentgate/verify;
        proxy_method POST;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-PAYMENT $http_x_payment;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-AgentGate-Edge "agentgate-edge-demo-secret";
        proxy_set_header X-AgentGate-Challenge-Id "";
        proxy_set_header traceparent $http_traceparent;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "X-PAYMENT-RESPONSE" always;
    }

    # ---- Internal: paid-resource serve target ------------------------------
    # X-Accel-Redirect lands here on a paid 200. Capture the JWT from __agt, drop
    # it from the query (origin never sees the token) while keeping the original
    # query, serve the resource, and re-emit the JWT for the agent to reuse.
    location /_agentgate_origin/ {
        internal;
        set $agt  $arg___agt;
        set $args $ag_origin_args;
        rewrite ^/_agentgate_origin/(.*)$ /$1 break;
        proxy_pass http://demo_upstream;
        proxy_set_header Host $host;
        add_header X-AgentGate-Token $agt always;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "X-AgentGate-Token" always;
    }

    # ---- Internal: error responses -----------------------------------------
    location @deny {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 403 '{"error":"forbidden","code":"AGENTGATE_DENY"}';
    }

    location @unavailable {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Retry-After "5" always;
        return 503 '{"error":"payment_service_unavailable","code":"AGENTGATE_DOWN"}';
    }
}
